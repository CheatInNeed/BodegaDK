services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../apps/web/public:/usr/share/nginx/html:ro
    depends_on:
      - server

  server:
    build:
      context: ../apps/server
    restart: unless-stopped
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/bodegadk
      - SPRING_DATASOURCE_USERNAME=bodegadk
      - SPRING_DATASOURCE_PASSWORD=bodegadk
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      POSTGRES_DB: bodegadk
      POSTGRES_USER: bodegadk
      POSTGRES_PASSWORD: bodegadk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - dbdata:/var/lib/postgresql/data


volumes:
  dbdata:
