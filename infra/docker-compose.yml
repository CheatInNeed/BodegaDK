services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../apps/web/public:/usr/share/nginx/html:ro
    depends_on:
      - server

  server:
    build:
      context: ../apps/server
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/bodegadk
      - SPRING_DATASOURCE_USERNAME=bodegadk
      - SPRING_DATASOURCE_PASSWORD=bodegadk
    depends_on:
      - db

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bodegadk
      POSTGRES_USER: bodegadk
      POSTGRES_PASSWORD: bodegadk
    volumes:
      - dbdata:/var/lib/postgresql/data


volumes:
  dbdata:
