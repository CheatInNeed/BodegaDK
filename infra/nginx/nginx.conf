server {
  listen 80;

  # Always revalidate SPA shell so clients discover latest build quickly.
  location = /index.html {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires -1;
  }

  # Revalidate compiled assets on refresh (keeps deploys visible without incognito).
  location /dist/ {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  # Web (statisk)
  location / {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires -1;
    try_files $uri $uri/ /index.html;
  }

  # REST API -> backend
  location /api/ {
    # Keep explicit API prefix stripping: /api/rooms -> /rooms on backend.
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://server:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket -> backend
  location /ws {
    proxy_pass http://server:8080/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
  }
}
